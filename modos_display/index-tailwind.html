<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
</head>
<body>
    <h1>Inline:</h1>
    <div class="inline bg-gray-600 text-white">Productos
    </div>
    <div class="inline bg-gray-700 text-white">Nosotros
    </div>
    <div class="inline bg-gray-800 text-white">Servicios
    </div>
    <div class="inline bg-gray-900 text-white"> Contacto
    </div>
    <hr>
    <h1>Block:</h1>
    <div class="Block bg-gray-600 text-white w-[200px] h-[100px]">Productos
    </div>
    <div class="Block bg-gray-700 text-white w-[200px] h-[100px]">Nosotros
    </div>
    <div class="Block bg-gray-800 text-white w-[200px] h-[100px]">Servicios
    </div>
    <div class="Block bg-gray-900 text-white w-[200px]  h-[100px]">Contacto
    </div>
</body>
</body>
</html>
